<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Skill Matrimony — An intelligent platform for engineering students to explore domains, prepare for exams, discover events, and map their career path." />
  <meta name="theme-color" content="#000b1e" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>Skill Matrimony | Elevate Engineering</title>
</head>

<body>
  <div id="root">
    <style>
      .splash-screen {
        position: fixed;
        inset: 0;
        background-color: #000b1e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }

      .splash-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(108, 63, 245, 0.2);
        border-top-color: #6C3FF5;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
        box-shadow: 0 0 20px rgba(108, 63, 245, 0.4);
      }

      .splash-text {
        color: white;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(to right, #ffffff, #a5b4fc);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .splash-glow {
        position: absolute;
        width: 200px;
        height: 200px;
        background: rgba(108, 63, 245, 0.3);
        border-radius: 50%;
        filter: blur(60px);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.5;
        }
      }
    </style>
    <div class="splash-screen">
      <div class="splash-glow"></div>
      <div class="splash-spinner"></div>
      <div class="splash-text">Skill Matrimony</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
